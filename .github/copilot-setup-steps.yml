# Copilot Coding Agent — Setup Steps
# This workflow configures the environment for the Copilot Coding Agent.
# The PBI audit is purely text/JSON/TMDL analysis — no special tooling required.

setup:
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify audit directory structure
      run: |
        mkdir -p audit/baseline
        mkdir -p audit/reports
        mkdir -p audit/post_refactor
